name: pages

on:
  workflow_dispatch:
    inputs:
      lanes:
        description: 'Lanes to run (all / github-only / velnor-only)'
        type: choice
        default: all
        options: [all, github-only, velnor-only]
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.set.outputs.configs }}
    steps:
      - id: set
        run: |
          case "${{ inputs.lanes }}" in
            github-only)
              echo 'configs=[{"lane":"github","runner":"\"ubuntu-latest\""}]' >> "$GITHUB_OUTPUT"
              ;;
            velnor-only)
              echo 'configs=[{"lane":"velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}]' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'configs=[{"lane":"github","runner":"\"ubuntu-latest\""},{"lane":"velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}]' >> "$GITHUB_OUTPUT"
              ;;
          esac

  build:
    needs: [matrix-setup]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fixture-pages-${{ matrix.config.lane }}-${{ runner.os }}
      - run: cargo doc --no-deps --workspace
      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/doc
          name: github-pages-${{ matrix.config.lane }}
      - uses: ./.github/actions/check-deployed-docs
        with:
          artifact-name: github-pages-${{ matrix.config.lane }}

  deploy:
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-github
