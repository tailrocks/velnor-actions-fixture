name: pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v0
      - uses: Swatinem/rust-cache@v2
      - shell: bash
        run: cargo doc --no-deps --workspace
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc
          name: github-pages-github

  build-velnor:
    runs-on: [self-hosted, velnor-target-mvp]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v0
      - uses: Swatinem/rust-cache@v2
      - shell: bash
        run: cargo doc --no-deps --workspace
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc
          name: github-pages-velnor
      - uses: ./.github/actions/check-deployed-docs
        with:
          artifact-name: github-pages-velnor

  deploy:
    needs: [build-github, build-velnor]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-github
