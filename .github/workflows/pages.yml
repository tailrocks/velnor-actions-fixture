name: pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - lane: github
            runner: '"ubuntu-latest"'
          - lane: velnor
            runner: '["self-hosted","velnor-target-mvp"]'
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fixture-pages-${{ matrix.config.lane }}-${{ runner.os }}
      - run: cargo doc --no-deps --workspace
      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/doc
          name: github-pages-${{ matrix.config.lane }}
      - uses: ./.github/actions/check-deployed-docs
        with:
          artifact-name: github-pages-${{ matrix.config.lane }}

  deploy:
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-github
