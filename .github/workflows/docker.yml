name: docker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fixture
          push: false
          load: true
          tags: velnor-actions-fixture:github
          build-args: |
            PACKAGE=app-a
      - shell: bash
        run: docker run --rm velnor-actions-fixture:github

  docker-velnor:
    runs-on: [self-hosted, velnor-target-mvp]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fixture
          push: false
          load: true
          tags: velnor-actions-fixture:velnor
          build-args: |
            PACKAGE=app-a
      - shell: bash
        run: docker run --rm velnor-actions-fixture:velnor

