name: docker

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crazy-max/ghaction-github-runtime@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fixture
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fixture
          push: false
          load: true
          tags: velnor-actions-fixture:github
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACKAGE=app-a
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - shell: bash
        run: docker run --rm velnor-actions-fixture:github
      - uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          push: false
          set: |
            fixture.cache-from=type=gha
            fixture.cache-to=type=gha,mode=max

  docker-velnor:
    runs-on: [self-hosted, velnor-target-mvp]
    steps:
      - uses: actions/checkout@v6
      - uses: crazy-max/ghaction-github-runtime@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fixture
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fixture
          push: false
          load: true
          tags: velnor-actions-fixture:velnor
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACKAGE=app-a
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - shell: bash
        run: docker run --rm velnor-actions-fixture:velnor
      - uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          push: false
          set: |
            fixture.cache-from=type=gha
            fixture.cache-to=type=gha,mode=max
