name: docker

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

jobs:
  docker-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Export ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN so Docker Buildx
      # can use the GitHub Actions cache backend (type=gha).
      - uses: crazy-max/ghaction-github-runtime@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fixture
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fixture
          push: false
          load: true
          tags: velnor-actions-fixture:github
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACKAGE=app-a
          # Scoped GHA cache — scope prevents cross-job cache pollution
          cache-from: type=gha,scope=fixture-build-github
          cache-to: type=gha,scope=fixture-build-github,mode=max
      - run: docker run --rm velnor-actions-fixture:github
      # Bake target — separate cache scope for bake vs build-push
      - uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          push: false
          set: |
            fixture.cache-from=type=gha,scope=fixture-bake-github
            fixture.cache-to=type=gha,scope=fixture-bake-github,mode=max
      - run: |
          {
            echo "### docker buildx cache (github)"
            echo '```'
            docker buildx du 2>/dev/null || echo 'buildx cache info not available'
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-velnor:
    runs-on: [self-hosted, velnor-target-mvp]
    steps:
      - uses: actions/checkout@v6
      # Export ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN so Docker Buildx
      # can use the GitHub Actions cache backend (type=gha).
      - uses: crazy-max/ghaction-github-runtime@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/fixture
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fixture
          push: false
          load: true
          tags: velnor-actions-fixture:velnor
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACKAGE=app-a
          # Scoped GHA cache — scope prevents cross-job cache pollution
          cache-from: type=gha,scope=fixture-build-velnor
          cache-to: type=gha,scope=fixture-build-velnor,mode=max
      - run: docker run --rm velnor-actions-fixture:velnor
      # Bake target — separate cache scope for bake vs build-push
      - uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          push: false
          set: |
            fixture.cache-from=type=gha,scope=fixture-bake-velnor
            fixture.cache-to=type=gha,scope=fixture-bake-velnor,mode=max
      - run: |
          {
            echo "### docker buildx cache (velnor)"
            echo '```'
            docker buildx du 2>/dev/null || echo 'buildx cache info not available'
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
