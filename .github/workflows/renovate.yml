name: renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  renovate:
    strategy:
      fail-fast: false
      matrix:
        config:
          - lane: github
            runner: '"ubuntu-latest"'
          - lane: velnor
            runner: '["self-hosted","velnor-target-mvp"]'
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    steps:
      - uses: actions/checkout@v6
      - uses: renovatebot/github-action@v46
        with:
          configurationFile: .github/renovate.json5
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
