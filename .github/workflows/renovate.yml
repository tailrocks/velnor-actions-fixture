name: renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.set.outputs.configs }}
    steps:
      - id: set
        run: |
          echo 'configs=[{"lane":"github","runner":"\"ubuntu-latest\""},{"lane":"velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}]' >> "$GITHUB_OUTPUT"

  renovate:
    needs: [matrix-setup]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/renovate/cache
          key: renovate-${{ matrix.config.lane }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: renovate-${{ matrix.config.lane }}-${{ runner.os }}-
      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: renovate.json
        env:
          # The PAT named "tailrocks-renovate" (fine-grained, not classic) must be
          # stored in the repo secret GH_RENOVATE_TOKEN.
          GH_RENOVATE_TOKEN: ${{ secrets.GH_RENOVATE_TOKEN }}
          RENOVATE_REPOSITORY_CACHE: enabled
      # Renovate container writes cache files as a different uid; restore ownership
      # so the actions/cache post step can save them.
      - if: always()
        run: sudo chown -R "$(whoami)" /tmp/renovate 2>/dev/null || true
