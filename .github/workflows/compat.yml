name: compat

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'crates/**'
              - 'mise.toml'
              - '.github/workflows/compat.yml'
            docker:
              - 'Dockerfile.fixture'
              - '.github/workflows/docker.yml'

  compat-github:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [app-a, app-b]
    outputs:
      lane: github
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v0
      - uses: extractions/setup-just@v4
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.9
        continue-on-error: true
      # Cargo registry/git/target cache — shared across packages, keyed by package for target/
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fixture-github-${{ runner.os }}
          key: ${{ matrix.package }}
      # ~/.cargo/bin cache — persists installed cargo binaries between runs
      - uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: fixture-cargo-bin-github-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: fixture-cargo-bin-github-${{ runner.os }}-
      - id: command-files
        run: |
          set -euo pipefail
          echo "FIXTURE_PACKAGE=${{ matrix.package }}" >> "${GITHUB_ENV}"
          echo "package=${{ matrix.package }}" >> "${GITHUB_OUTPUT}"
          echo "setup-state=complete" >> "${GITHUB_STATE}"
          mkdir -p "${HOME}/.local/bin"
          printf '%s\n' '#!/usr/bin/env bash' 'echo fixture-tool-ok' > "${HOME}/.local/bin/fixture-tool"
          chmod +x "${HOME}/.local/bin/fixture-tool"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "### github ${{ matrix.package }}" >> "${GITHUB_STEP_SUMMARY}"
      - run: just fmt-check
      - run: just clippy "${{ matrix.package }}"
      - run: just test "${{ matrix.package }}"
      - run: just nextest "${{ matrix.package }}"
      - if: always()
        run: |
          {
            echo "### sccache stats (github ${{ matrix.package }})"
            echo '```'
            sccache --show-stats 2>/dev/null || echo 'sccache not available'
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: ./.github/actions/check-fixture-output
        with:
          package: ${{ steps.command-files.outputs.package }}
      - run: python3 .github/scripts/write-result.py "${{ matrix.package }}" github "out/result.json"
      - uses: actions/upload-artifact@v7
        with:
          name: result-github-${{ matrix.package }}
          path: out/result.json

  compat-velnor:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true'
    runs-on: [self-hosted, velnor-target-mvp]
    strategy:
      fail-fast: false
      matrix:
        package: [app-a, app-b]
    outputs:
      lane: velnor
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v0
      - uses: extractions/setup-just@v4
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.9
        continue-on-error: true
      # Cargo registry/git/target cache — shared across packages, keyed by package for target/
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fixture-velnor-${{ runner.os }}
          key: ${{ matrix.package }}
      # ~/.cargo/bin cache — persists installed cargo binaries between runs
      - uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: fixture-cargo-bin-velnor-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: fixture-cargo-bin-velnor-${{ runner.os }}-
      - id: command-files
        run: |
          set -euo pipefail
          echo "FIXTURE_PACKAGE=${{ matrix.package }}" >> "${GITHUB_ENV}"
          echo "package=${{ matrix.package }}" >> "${GITHUB_OUTPUT}"
          echo "setup-state=complete" >> "${GITHUB_STATE}"
          mkdir -p "${HOME}/.local/bin"
          printf '%s\n' '#!/usr/bin/env bash' 'echo fixture-tool-ok' > "${HOME}/.local/bin/fixture-tool"
          chmod +x "${HOME}/.local/bin/fixture-tool"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "### velnor ${{ matrix.package }}" >> "${GITHUB_STEP_SUMMARY}"
      - run: just fmt-check
      - run: just clippy "${{ matrix.package }}"
      - run: just test "${{ matrix.package }}"
      - run: just nextest "${{ matrix.package }}"
      - if: always()
        run: |
          {
            echo "### sccache stats (velnor ${{ matrix.package }})"
            echo '```'
            sccache --show-stats 2>/dev/null || echo 'sccache not available'
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: ./.github/actions/check-fixture-output
        with:
          package: ${{ steps.command-files.outputs.package }}
      - run: python3 .github/scripts/write-result.py "${{ matrix.package }}" velnor "out/result.json"
      - uses: actions/upload-artifact@v7
        with:
          name: result-velnor-${{ matrix.package }}
          path: out/result.json

  compare-results:
    needs: [compat-github, compat-velnor]
    if: always() && needs.compat-github.result == 'success' && needs.compat-velnor.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - run: python3 .github/scripts/compare-results.py artifacts
      - uses: ./.github/actions/aggregate-needs
        with:
          expected: success
          actual: ${{ needs.compat-velnor.result }}
