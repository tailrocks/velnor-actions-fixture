name: compat

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'crates/**'
              - 'mise.toml'
              - '.github/workflows/compat.yml'

  compat:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: [app-a, app-b]
        config:
          - lane: github
            runner: '"ubuntu-latest"'
          - lane: velnor
            runner: '["self-hosted","velnor-target-mvp"]'
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: extractions/setup-just@v4
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fixture-${{ matrix.config.lane }}-${{ runner.os }}
          key: ${{ matrix.package }}
      - uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: fixture-cargo-bin-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: fixture-cargo-bin-${{ matrix.config.lane }}-${{ runner.os }}-
      - id: command-files
        run: |
          set -euo pipefail
          echo "FIXTURE_PACKAGE=${{ matrix.package }}" >> "${GITHUB_ENV}"
          echo "package=${{ matrix.package }}" >> "${GITHUB_OUTPUT}"
          echo "setup-state=complete" >> "${GITHUB_STATE}"
          mkdir -p "${HOME}/.local/bin"
          printf '%s\n' '#!/usr/bin/env bash' 'echo fixture-tool-ok' > "${HOME}/.local/bin/fixture-tool"
          chmod +x "${HOME}/.local/bin/fixture-tool"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "### ${{ matrix.config.lane }} ${{ matrix.package }}" >> "${GITHUB_STEP_SUMMARY}"
      - run: just fmt-check
      - run: just clippy "${{ matrix.package }}"
      - run: just test "${{ matrix.package }}"
      - run: just nextest "${{ matrix.package }}"
      - if: always()
        run: |
          {
            echo "### sccache stats (${{ matrix.config.lane }} ${{ matrix.package }})"
            echo '```'
            sccache --show-stats 2>/dev/null || echo 'sccache not available'
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: ./.github/actions/check-fixture-output
        with:
          package: ${{ steps.command-files.outputs.package }}
      - run: python3 .github/scripts/write-result.py "${{ matrix.package }}" "${{ matrix.config.lane }}" "out/result.json"
      - uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.config.lane }}-${{ matrix.package }}
          path: out/result.json

  compare-results:
    needs: [compat]
    if: always() && needs.compat.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - run: python3 .github/scripts/compare-results.py artifacts
      - uses: ./.github/actions/aggregate-needs
        with:
          expected: success
          actual: ${{ needs.compat.result }}
