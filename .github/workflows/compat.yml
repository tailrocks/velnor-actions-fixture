name: compat

on:
  push:
  pull_request:
  merge_group:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      lanes:
        description: 'Lanes to run (all / github-only / velnor-only)'
        type: choice
        default: all
        options: [all, github-only, velnor-only]
      packages:
        description: 'Packages filter (comma-separated, empty = all)'
        type: string
        default: ''

permissions:
  contents: read
  actions: read

# Matches ChainArgos/Jackin: cancel in-progress on PR, keep on push/schedule
concurrency:
  group: compat-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docker: ${{ steps.filter.outputs.docker }}
      tools: ${{ steps.filter.outputs.tools }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'mise.toml'
              - '.github/workflows/compat.yml'
            docker:
              - 'Dockerfile.fixture'
              - 'docker-bake.hcl'
              - '.github/workflows/docker.yml'
            tools:
              - 'justfile'
              - 'mise.toml'

  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.set.outputs.configs }}
    steps:
      - id: set
        run: |
          case "${{ inputs.lanes }}" in
            github-only)
              echo 'configs=[{"lane":"github","runner":"\"ubuntu-latest\""}]' >> "$GITHUB_OUTPUT"
              ;;
            velnor-only)
              echo 'configs=[{"lane":"velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}]' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'configs=[{"lane":"github","runner":"\"ubuntu-latest\""},{"lane":"velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}]' >> "$GITHUB_OUTPUT"
              ;;
          esac

  compat:
    needs: [changes, matrix-setup]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'merge_group' ||
      (needs.changes.outputs.rust == 'true' &&
       (inputs.packages == '' || contains(inputs.packages, matrix.package)))
    strategy:
      fail-fast: false
      matrix:
        package: [app-a, app-b]
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    permissions:
      contents: read
      actions: read
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: extractions/setup-just@v4
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fixture-${{ matrix.config.lane }}-${{ runner.os }}
          key: ${{ matrix.package }}
      - uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: fixture-cargo-bin-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: fixture-cargo-bin-${{ matrix.config.lane }}-${{ runner.os }}-
      # Compute MSRV from Cargo.toml — mirrors Jackin MSRV toolchain pattern
      - id: msrv
        run: |
          set -euo pipefail
          version="$(grep '^rust-version' "crates/${{ matrix.package }}/Cargo.toml" | sed 's/.*= *"\(.*\)"/\1/' || echo 'stable')"
          echo "version=${version:-stable}" >> "${GITHUB_OUTPUT}"
      - id: command-files
        env:
          PACKAGE: ${{ matrix.package }}
          LANE: ${{ matrix.config.lane }}
        run: |
          set -euo pipefail
          echo "FIXTURE_PACKAGE=${PACKAGE}" >> "${GITHUB_ENV}"
          echo "package=${PACKAGE}" >> "${GITHUB_OUTPUT}"
          echo "lane=${LANE}" >> "${GITHUB_OUTPUT}"
          echo "setup-state=complete" >> "${GITHUB_STATE}"
          # Multiline heredoc output — matches ChainArgos bake-targets pattern
          printf 'packages<<EOF\n%s\n%s\nEOF\n' "app-a" "app-b" >> "${GITHUB_OUTPUT}"
          mkdir -p "${HOME}/.local/bin"
          printf '%s\n' '#!/usr/bin/env bash' 'echo fixture-tool-ok' > "${HOME}/.local/bin/fixture-tool"
          chmod +x "${HOME}/.local/bin/fixture-tool"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "### ${LANE} ${PACKAGE}" >> "${GITHUB_STEP_SUMMARY}"
      - run: just fmt-check
      - run: just clippy "${{ matrix.package }}"
      - run: just test "${{ matrix.package }}"
      - run: just nextest "${{ matrix.package }}"
      # Verify MSRV step with env injection — mirrors Jackin MSRV pattern
      - name: Check MSRV
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
        run: cargo check -p "${{ matrix.package }}" --locked
      - if: always()
        run: |
          {
            echo "### sccache stats (${{ matrix.config.lane }} ${{ matrix.package }})"
            echo '```'
            sccache --show-stats 2>/dev/null || echo 'sccache not available'
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - uses: ./.github/actions/check-fixture-output
        with:
          package: ${{ steps.command-files.outputs.package }}
      - run: python3 .github/scripts/write-result.py "${{ matrix.package }}" "${{ matrix.config.lane }}" "out/result.json"
      - uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.config.lane }}-${{ matrix.package }}
          path: out/result.json

  # Required aggregate job — mirrors ChainArgos rust-required / Jackin ci-required
  compat-required:
    if: always()
    needs: [changes, compat]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/aggregate-needs
        with:
          needs-json: ${{ toJSON(needs) }}
          workflow-label: compat

  compare-results:
    needs: [compat]
    if: always() && needs.compat.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false
      - run: python3 .github/scripts/compare-results.py artifacts
      - uses: ./.github/actions/aggregate-needs
        with:
          expected: success
          actual: ${{ needs.compat.result }}
